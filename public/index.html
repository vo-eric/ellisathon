<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki Speedrun</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Screen 1: Alias entry -->
    <div id="screen-alias" class="screen active">
      <div class="card">
        <h1>Wiki Speedrun</h1>
        <p class="subtitle">
          Race through Wikipedia. First to the target article wins.
        </p>
        <form id="alias-form">
          <input
            type="text"
            id="alias-input"
            placeholder="Enter your alias"
            maxlength="20"
            autocomplete="off"
            required
          />
          <button type="submit">Enter</button>
        </form>
      </div>
    </div>

    <!-- Screen 2: Lobby browser -->
    <div id="screen-lobbies" class="screen">
      <div class="topbar">
        <span id="player-name-display"></span>
        <button id="btn-create-lobby" class="btn-primary">Create Lobby</button>
      </div>

      <div class="lobby-container">
        <h2>Open Lobbies</h2>
        <div id="lobby-list" class="lobby-list">
          <p class="empty-state">No lobbies available. Create one!</p>
        </div>
      </div>
    </div>

    <!-- Screen 3: Waiting room -->
    <div id="screen-waiting" class="screen">
      <div class="card">
        <h2>Waiting for opponent&hellip;</h2>
        <div id="waiting-info"></div>
        <div class="loader"></div>
      </div>
    </div>

    <!-- Screen 4: Game -->
    <div id="screen-game" class="screen">
      <div class="game-bar">
        <div class="game-bar-left">
          <span class="game-label">Current</span>
          <span id="game-current-article" class="game-article-name">—</span>
        </div>
        <div class="game-bar-center">
          <span id="game-move-count" class="game-moves">0 moves</span>
        </div>
        <div class="game-bar-right">
          <span class="game-label">Target</span>
          <span id="game-target-article" class="game-article-name target"
            >—</span
          >
        </div>
      </div>
      <iframe id="wiki-frame" class="wiki-frame"></iframe>
    </div>

    <!-- Screen 5: Game over -->
    <div id="screen-gameover" class="screen">
      <div class="card">
        <h2 id="gameover-title">You Win!</h2>
        <div id="gameover-info"></div>
        <button id="btn-back-to-lobbies">Back to Lobbies</button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
